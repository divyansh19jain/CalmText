services:
  # Backend FastAPI Service
  - type: web
    name: calmtext-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
    rootDir: apps/api

  # Frontend React/Vite Static Site
  - type: static
    name: calmtext-web
    runtime: node
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://calmtext-api.onrender.com/api/v1
    rootDir: apps/web
